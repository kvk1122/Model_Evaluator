<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cerebras Perf Prism</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#0d0d0f;--surf:#131316;--surf2:#1a1a1f;--surf3:#222228;
  --border:#2c2c35;--border2:#3a3a46;
  --text:#e6e6f0;--text2:#8888a0;--text3:#4a4a60;
  --primary:#6c63ff;--primary-soft:rgba(108,99,255,.14);
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rl:14px;--shadow:0 8px 32px rgba(0,0,0,.45);
}
[data-theme="light"]{
  --bg:#f4f4f8;--surf:#ffffff;--surf2:#f0f0f5;--surf3:#e8e8f0;
  --border:#e0e0ea;--border2:#cacad8;
  --text:#18181f;--text2:#55556a;--text3:#9898b0;
  --primary:#5046e4;--primary-soft:rgba(80,70,228,.1);
  --green:#16a34a;--green-bg:rgba(22,163,74,.1);
  --yellow:#d97706;--yellow-bg:rgba(217,119,6,.1);
  --red:#dc2626;--red-bg:rgba(220,38,38,.1);
  --shadow:0 8px 32px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select{font:inherit;color:inherit}

/* ── LAYOUT ─────────────────────────────────────────── */
.header{display:flex;align-items:center;gap:12px;padding:0 28px;height:58px;
  background:var(--surf);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.4px;white-space:nowrap}
.header-center{flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
.header-right{display:flex;align-items:center;gap:8px;white-space:nowrap}
.content{max-width:1280px;margin:0 auto;padding:28px 28px}

/* ── TABS ────────────────────────────────────────────── */
.tab-bar{display:flex;gap:2px;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--rl);padding:4px;width:fit-content}
.tab{padding:8px 24px;border-radius:10px;font-size:13px;font-weight:500;
  color:var(--text2);transition:all .18s;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text);background:var(--surf3)}
.tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 12px rgba(108,99,255,.35)}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:var(--r);font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{filter:brightness(1.12)}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--surf2);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:8px;border-radius:var(--r);background:var(--surf2);border:1px solid var(--border);color:var(--text2)}
.btn-icon:hover{color:var(--text);border-color:var(--border2)}

/* ── UPLOAD ZONE ─────────────────────────────────────── */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:44px 32px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--surf)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--primary);background:var(--primary-soft)}
.upload-title{font-size:15px;font-weight:600;margin-bottom:6px}
.upload-sub{font-size:12px;color:var(--text2)}

/* ── FILE PILLS ──────────────────────────────────────── */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
  background:var(--surf2);border:1px solid var(--border);border-radius:99px;font-size:11px;color:var(--text2)}
.pill-new{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}

/* ── SECTION HEADERS ─────────────────────────────────── */
.section-hd{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--text3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* ── CARDS ───────────────────────────────────────────── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.card-sm{padding:14px 16px}

/* ── KPI ─────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.kpi-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px}
.kpi-val{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ── TARGET INPUTS ───────────────────────────────────── */
.target-bar{display:flex;align-items:center;flex-wrap:wrap;gap:16px;
  background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);
  padding:16px 20px;margin-bottom:24px}
.target-group{display:flex;align-items:center;gap:8px}
.target-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.target-input{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);
  padding:6px 10px;font-size:13px;font-family:var(--mono);color:var(--text);
  outline:none;width:110px}
.target-input:focus{border-color:var(--primary)}
.target-unit{font-size:11px;color:var(--text3);white-space:nowrap}

/* ── MODEL CARDS ─────────────────────────────────────── */
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;margin-bottom:32px}
.mc{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);
  padding:20px;transition:box-shadow .2s,border-color .2s}
.mc:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.mc.go{border-top:3px solid var(--green)}
.mc.borderline{border-top:3px solid var(--yellow)}
.mc.nogo{border-top:3px solid var(--red)}
.mc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.mc-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.mc-sub{font-size:11px;color:var(--text3);margin-top:2px}
.mc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc-metric{background:var(--surf2);border-radius:var(--r);padding:10px 12px}
.mc-metric-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mc-metric-val{font-size:15px;font-weight:700;font-family:var(--mono)}
.mc-insight{font-size:12px;color:var(--text2);line-height:1.55;
  background:var(--surf2);border-radius:var(--r);padding:10px 12px}

/* ── BADGES ──────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.2px}
.badge-go{background:var(--green-bg);color:var(--green)}
.badge-borderline{background:var(--yellow-bg);color:var(--yellow)}
.badge-nogo{background:var(--red-bg);color:var(--red)}
.badge-new{background:var(--primary-soft);color:var(--primary)}

/* ── TABLE ───────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--surf2);position:sticky;top:0;z-index:10}
th{padding:10px 14px;text-align:left;font-weight:600;color:var(--text2);
  font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:9px 14px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:12px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.td-text{font-family:var(--font);font-weight:500;color:var(--text)}
.anom-hi{color:var(--red);font-weight:700}
.anom-md{color:var(--yellow);font-weight:600}

/* ── FILTERS ─────────────────────────────────────────── */
.filter-bar{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.fl{font-size:12px;color:var(--text2);font-weight:500}
select{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);
  padding:6px 10px;font-size:13px;color:var(--text);outline:none}
select:focus{border-color:var(--primary)}

/* ── CHARTS ──────────────────────────────────────────── */
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-grid-1{display:grid;grid-template-columns:1fr;gap:20px;margin-bottom:24px}
.chart-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:16px}
.chart-wrap{position:relative;height:250px}

/* ── COMPARE MODE TOGGLE ─────────────────────────────── */
.cmp-toggle{display:flex;gap:2px;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--r);padding:3px;width:fit-content;margin-bottom:20px}
.cmp-btn{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:500;
  color:var(--text2);transition:all .15s}
.cmp-btn:hover{color:var(--text)}
.cmp-btn.active{background:var(--surf);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.2);border:1px solid var(--border)}

/* ── HEAD TO HEAD ────────────────────────────────────── */
.hth-selectors{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.hth-vs{font-size:13px;font-weight:700;color:var(--text3)}
.hth-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;margin-bottom:24px;align-items:start}
.hth-col{background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.hth-col.winner-col{border-color:var(--green)}
.hth-name{font-size:18px;font-weight:700;margin-bottom:16px}
.hth-metrics{display:flex;flex-direction:column;gap:8px}
.hth-metric{display:flex;justify-content:space-between;align-items:center;
  background:var(--surf2);border-radius:var(--r);padding:10px 14px}
.hth-metric-label{font-size:11px;color:var(--text2);font-weight:500}
.hth-metric-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.hth-metric-val.win{color:var(--green)}
.hth-vs-col{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding-top:56px}
.vs-badge{font-size:11px;font-weight:700;padding:4px 8px;border-radius:99px;white-space:nowrap}
.vs-badge.left-win{background:var(--green-bg);color:var(--green)}
.vs-badge.right-win{background:var(--green-bg);color:var(--green)}
.vs-badge.tie{background:var(--surf3);color:var(--text3)}

/* ── EMPTY ───────────────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 32px;text-align:center;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}
.empty p{font-size:13px;max-width:38ch;line-height:1.6}

/* ── DIVIDER ─────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:28px 0}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:768px){
  .chart-grid-2{grid-template-columns:1fr}
  .hth-grid{grid-template-columns:1fr;grid-template-rows:auto auto auto}
  .hth-vs-col{flex-direction:row;padding-top:0;flex-wrap:wrap;justify-content:center}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .content{padding:16px}
  .header{padding:0 16px}
}
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header class="header">
  <div class="logo">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <rect width="30" height="30" rx="8" fill="#6c63ff"/>
      <path d="M6 15h5l3-8 4 16 3-8h5" stroke="#fff" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Cerebras Perf Prism
  </div>

  <div class="header-center">
    <div class="tab-bar">
      <button class="tab active" id="tab-customer" onclick="switchTab('customer')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        Customer / PM
      </button>
      <button class="tab" id="tab-engineer" onclick="switchTab('engineer')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4M7 8l2 2-2 2M11 12h5"/>
        </svg>
        Engineer
      </button>
    </div>
  </div>

  <div class="header-right">
    <span id="hdr-status" style="font-size:12px;color:var(--text3)">No data</span>
    <button class="btn btn-primary btn-sm" onclick="triggerUpload()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload Sweeps
    </button>
    <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme">
      <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls" multiple style="display:none"
    onchange="handleFiles(this.files)">
</header>

<!-- ── MAIN ─────────────────────────────────────────────── -->
<main class="content" id="main-content"></main>

<script>
// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const S = {
  records: [],
  files: [],        // {name, model, count, isNew}
  tab: 'customer',
  targets: { throughput: 50000, genSpeed: 500 },
  engFilter: { model: 'All', profile: 'All', sort: 'model' },
  cmpMode: { customer: 'all', engineer: 'all' },
  hth: { customer: { a: null, b: null }, engineer: { a: null, b: null } },
  engCmpMetric: 'throughput'
};
const COLORS = ['#6c63ff','#22c55e','#f59e0b','#ef4444','#06b6d4',
                '#a855f7','#f97316','#84cc16','#14b8a6','#f43f5e','#3b82f6','#e879f9'];

// ════════════════════════════════════════════════════════
//  THEME
// ════════════════════════════════════════════════════════
function toggleTheme(){
  const d=document.documentElement;
  const next=d.getAttribute('data-theme')==='dark'?'light':'dark';
  d.setAttribute('data-theme',next);
  document.getElementById('theme-icon').innerHTML=next==='dark'
    ?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    :'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
}

// ════════════════════════════════════════════════════════
//  XLSX PARSER
// ════════════════════════════════════════════════════════
const COL_MAP={
  inputLength:['input length','input len','input_length'],
  outputLength:['output length','output len','output_length'],
  cachePct:['cache %','cache%','cache pct','cache percent'],
  batchSize:['batch size','batch'],
  maxMs:['max number of milliseconds','max ms','max milliseconds'],
  targetMaxMs:['target max number of milliseconds','target max ms','target ms','target max'],
  promptOnlyTps:['prompt only throughput (t/s)','prompt only throughput','prompt only tps'],
  genOnlyTps:['gen only throughput (t/s)','gen only throughput','gen only tps'],
  throughput:['throughput (t/s)','throughput t/s','throughput(t/s)','throughput'],
  throughputPerBox:['throughput / box (t/s/hardware)','throughput / box','throughput/box'],
  uncachedThroughput:['uncached throughput (t/s)','uncached throughput t/s','uncached throughput'],
  uncachedPerBox:['uncached throughput / box (t/s/hardware)','uncached throughput / box'],
  cachedThroughput:['cached throughput (t/s)','cached throughput t/s','cached throughput'],
  cachedPerBox:['cached throughput / box (t/s/hardware)','cached throughput / box'],
  ttft:['ttft (ms)','ttft(ms)','ttft ms','ttft','time to first token'],
  realPromptSpeed:['real prompt speed (t/s/user)','real prompt speed'],
  promptSpeedQueue:['prompt speed with queueing (t/s/user)','prompt speed with queueing'],
  genSpeed:['gen speed (t/s/user)','gen speed t/s/user','gen speed'],
  rpm:['rpm','requests per minute']
};
function matchCol(h){
  const n=String(h||'').replace(/\s+/g,' ').trim().toLowerCase();
  for(const[f,a]of Object.entries(COL_MAP)){if(a.some(x=>n===x))return f;}
  for(const[f,a]of Object.entries(COL_MAP)){if(a.some(x=>n.includes(x)||x.includes(n)))return f;}
  return null;
}
function toNum(v){
  if(v===null||v===undefined||v==='')return null;
  if(typeof v==='number')return isFinite(v)?v:null;
  const m=String(v).replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
  return m?+m[0]:null;
}
function inferMP(name){
  const mm=name.match(/[Mm]odel[\s_-]*([A-Za-z0-9]+)/i);
  const pm=name.match(/[Pp]rofile[\s_-]*(\d+)/i);
  return{model:mm?`Model ${mm[1].toUpperCase()}`:name,
         profile:pm?`Profile ${pm[1]}`:'Profile ?'};
}
function parseWB(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const{model,profile}=inferMP(file.name);
      const rows=[];
      for(const sn of wb.SheetNames){
        const ws=wb.Sheets[sn];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        if(raw.length<2)continue;
        let hr=0;
        for(let i=0;i<Math.min(8,raw.length);i++){
          if(raw[i].filter(v=>v!==null&&String(v).trim()!=='').length>=4){hr=i;break;}
        }
        const hdrs=(raw[hr]||[]).map(v=>String(v||'').trim());
        const ci={};hdrs.forEach((h,i)=>{const f=matchCol(h);if(f&&!(f in ci))ci[f]=i;});
        const dr=raw.slice(hr+1);
        let ffI=null,ffO=null,ffC=null;
        dr.forEach((row,ri)=>{
          const g=f=>(f in ci?toNum(row[ci[f]]):null);
          const vI=g('inputLength'),vO=g('outputLength'),vC=g('cachePct');
          if(vI!==null)ffI=vI;if(vO!==null)ffO=vO;if(vC!==null)ffC=vC;
          const bs=g('batchSize');
          if(![g('throughput'),g('ttft'),g('genSpeed'),g('rpm'),bs].some(v=>v!==null))return;
          const rec={id:`${file.name}::${ri}`,fileName:file.name,sheetName:sn,
            model,profile,inputLength:ffI,outputLength:ffO,cachePct:ffC,batchSize:bs,
            maxMs:g('maxMs'),targetMaxMs:g('targetMaxMs'),
            promptOnlyTps:g('promptOnlyTps'),genOnlyTps:g('genOnlyTps'),
            throughput:g('throughput'),throughputPerBox:g('throughputPerBox'),
            uncachedThroughput:g('uncachedThroughput'),uncachedPerBox:g('uncachedPerBox'),
            cachedThroughput:g('cachedThroughput'),cachedPerBox:g('cachedPerBox'),
            ttft:g('ttft'),realPromptSpeed:g('realPromptSpeed'),
            promptSpeedQueue:g('promptSpeedQueue'),genSpeed:g('genSpeed'),
            rpm:g('rpm'),anomaly:0,isNew:true};
          if(rec.throughput!==null&&rec.throughput<=0)rec.anomaly+=3;
          if(rec.ttft!==null&&rec.ttft<0)rec.anomaly+=3;
          if(rec.ttft!==null&&rec.ttft>30000)rec.anomaly+=2;
          if(rec.genSpeed!==null&&rec.genSpeed<0)rec.anomaly+=2;
          if(rec.rpm!==null&&rec.rpm<=0)rec.anomaly+=1;
          rows.push(rec);
        });
      }
      res(rows);
    };
    r.readAsArrayBuffer(file);
  });
}

function triggerUpload(){document.getElementById('file-input').click();}
async function handleFiles(files){
  if(!files||!files.length)return;
  for(const f of files){
    const rows=await parseWB(f);
    if(!rows.length)continue;
    S.records=S.records.filter(r=>r.fileName!==f.name);
    S.files=S.files.filter(x=>x.name!==f.name);
    rows.forEach(r=>S.records.push(r));
    S.files.push({name:f.name,model:rows[0].model,count:rows.length,isNew:true});
  }
  updateStatus();render();
}

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function median(a){
  if(!a.length)return null;
  const s=[...a].sort((x,y)=>x-y),m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}
function fmt(v,d=0){
  if(v===null||v===undefined)return'—';
  if(v>=1e6)return(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return(v/1e3).toFixed(1)+'k';
  return v.toFixed(d);
}
function fmtFull(v,d=1){
  if(v===null||v===undefined)return'—';
  return v.toLocaleString('en-US',{maximumFractionDigits:d});
}
function getModels(){return[...new Set(S.records.map(r=>r.model))].sort();}
function getProfiles(){return[...new Set(S.records.map(r=>r.profile))].sort();}
function modelColor(m){const ms=getModels();return COLORS[ms.indexOf(m)%COLORS.length];}
function mStats(m,profile=null){
  let recs=S.records.filter(r=>r.model===m);
  if(profile)recs=recs.filter(r=>r.profile===profile);
  const p=f=>recs.map(r=>r[f]).filter(v=>v!==null);
  return{throughput:median(p('throughput')),genSpeed:median(p('genSpeed')),
    ttft:median(p('ttft')),rpm:median(p('rpm')),
    throughputPerBox:median(p('throughputPerBox')),
    cachedThroughput:median(p('cachedThroughput')),
    uncachedThroughput:median(p('uncachedThroughput')),
    maxAnomaly:Math.max(0,...recs.map(r=>r.anomaly)),
    rowCount:recs.length,profiles:[...new Set(recs.map(r=>r.profile))].sort()};
}
function goStatus(stats){
  const t=S.targets;
  const tOk=stats.throughput!==null&&stats.throughput>=t.throughput;
  const gOk=stats.genSpeed!==null&&stats.genSpeed>=t.genSpeed;
  if(tOk&&gOk)return'go';
  if(tOk||gOk)return'borderline';
  return'nogo';
}
function badgeHtml(st){
  if(st==='go')return`<span class="badge badge-go">✓ GO</span>`;
  if(st==='borderline')return`<span class="badge badge-borderline">~ BORDERLINE</span>`;
  return`<span class="badge badge-nogo">✗ NO-GO</span>`;
}
function insightText(m,stats,status){
  const thr=fmt(stats.throughput);
  const gs=stats.genSpeed?stats.genSpeed.toFixed(0):null;
  const tgt=fmt(S.targets.throughput);
  const gtgt=S.targets.genSpeed;
  if(status==='go')return`${m} meets both targets — ${thr} tok/s throughput and ${gs} tok/s/user gen speed. Safe to commit.`;
  if(status==='borderline'){
    const miss=stats.throughput<S.targets.throughput?`throughput (${thr} vs ${tgt} target)`:`gen speed (${gs} vs ${gtgt} target)`;
    return`${m} is close but ${miss} is under target. Verify this fits your peak load before committing.`;
  }
  return`${m} does not meet targets — throughput ${thr} vs ${tgt} target, gen speed ${gs||'?'} vs ${gtgt} target.`;
}
function updateStatus(){
  const models=getModels().length,rows=S.records.length;
  document.getElementById('hdr-status').textContent=
    rows?`${models} model${models!==1?'s':''} · ${rows} rows`:'No data';
}

function renderCustomerCompare(models){
  const mode=S.cmpMode.customer;
  const hth=S.hth.customer;
  if(!hth.a)hth.a=models[0]||null;
  if(!hth.b)hth.b=models[1]||null;

  const toggle=`<div class="cmp-toggle">
    <button class="cmp-btn ${mode==='all'?'active':''}" onclick="S.cmpMode.customer='all';destroyAllCharts();render()">All Models</button>
    <button class="cmp-btn ${mode==='hth'?'active':''}" onclick="S.cmpMode.customer='hth';destroyAllCharts();render()">Head-to-Head</button>
  </div>`;

  if(mode==='all'){
    return toggle+`
      <div class="chart-grid-2">
        <div class="chart-box">
          <div class="chart-title">Throughput (tok/s) — higher is better</div>
          <div class="chart-wrap"><canvas id="c-cust-thr"></canvas></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">Gen Speed (tok/s/user) — higher is better</div>
          <div class="chart-wrap"><canvas id="c-cust-gen"></canvas></div>
        </div>
      </div>`;
  }

  // head-to-head
  const selA=hth.a,selB=hth.b;
  const modelSel=(key,val)=>`<select onchange="S.hth.customer.${key}=this.value;destroyAllCharts();render()">
    ${models.map(m=>`<option ${val===m?'selected':''}>${m}</option>`).join('')}
  </select>`;

  const statsA=selA?mStats(selA):null;
  const statsB=selB?mStats(selB):null;

  const metrics=[
    {key:'throughput',label:'Throughput',unit:'tok/s',higherBetter:true},
    {key:'genSpeed',label:'Gen Speed',unit:'tok/s/user',higherBetter:true}
  ];

  const winA=[],winB=[];
  metrics.forEach(({key,higherBetter})=>{
    const a=statsA?.[key],b=statsB?.[key];
    if(a!==null&&b!==null){
      if(higherBetter?(a>b):(a<b))winA.push(key);
      else if(higherBetter?(b>a):(b<a))winB.push(key);
    }
  });

  const colA=metrics.map(({key,label,unit,higherBetter})=>{
    const a=statsA?.[key],b=statsB?.[key];
    const win=a!==null&&b!==null&&(higherBetter?(a>=b):(a<=b));
    return`<div class="hth-metric">
      <span class="hth-metric-label">${label}</span>
      <span class="hth-metric-val ${win?'win':''}">${key==='throughput'?fmt(a):a?a.toFixed(0):'—'} <span style="font-size:10px;color:var(--text3)">${unit}</span></span>
    </div>`;
  }).join('');

  const colB=metrics.map(({key,label,unit,higherBetter})=>{
    const a=statsA?.[key],b=statsB?.[key];
    const win=b!==null&&a!==null&&(higherBetter?(b>=a):(b<=a));
    return`<div class="hth-metric">
      <span class="hth-metric-label">${label}</span>
      <span class="hth-metric-val ${win?'win':''}">${key==='throughput'?fmt(b):b?b.toFixed(0):'—'} <span style="font-size:10px;color:var(--text3)">${unit}</span></span>
    </div>`;
  }).join('');

  const vsBadges=metrics.map(({key,label,higherBetter})=>{
    const a=statsA?.[key],b=statsB?.[key];
    if(a===null||b===null)return`<span class="vs-badge tie">—</span>`;
    if(higherBetter?(a>b):(a<b))return`<span class="vs-badge left-win">${selA} ←</span>`;
    if(higherBetter?(b>a):(b<a))return`<span class="vs-badge right-win">→ ${selB}</span>`;
    return`<span class="vs-badge tie">Tie</span>`;
  }).join('');

  return toggle+`
    <div class="hth-selectors">
      ${modelSel('a',selA)}
      <span class="hth-vs">vs</span>
      ${modelSel('b',selB)}
    </div>
    <div class="hth-grid">
      <div class="hth-col ${winA.length>winB.length?'winner-col':''}">
        <div class="hth-name" style="color:${modelColor(selA)}">${selA}</div>
        <div class="hth-metrics">${colA}</div>
      </div>
      <div class="hth-vs-col">${vsBadges}</div>
      <div class="hth-col ${winB.length>winA.length?'winner-col':''}">
        <div class="hth-name" style="color:${modelColor(selB)}">${selB}</div>
        <div class="hth-metrics">${colB}</div>
      </div>
    </div>
    <div class="chart-grid-1">
      <div class="chart-box">
        <div class="chart-title">${selA} vs ${selB} — across all profiles</div>
        <div class="chart-wrap"><canvas id="c-cust-hth"></canvas></div>
      </div>
    </div>`;
}

    if(Math.abs(a-b)<0.01)return`<span class="vs-badge tie" style="font-size:9px">${label}: Tie</span>`;
    if(higherBetter?(a>b):(a<b))return`<span class="vs-badge left-win" style="font-size:9px">${label}: ${selA}</span>`;
    return`<span class="vs-badge right-win" style="font-size:9px">${label}: ${selB}</span>`;
  }).join('');

  return toggle+`
    <div class="hth-selectors">
      ${modelSel('a',selA)}
      <span class="hth-vs">vs</span>
      ${modelSel('b',selB)}
    </div>
    <div class="hth-grid">
      <div class="hth-col">
        <div class="hth-name" style="color:${modelColor(selA)}">${selA}</div>
        <div class="hth-metrics">${buildCol(statsA,statsB,metrics)}</div>
      </div>
      <div class="hth-vs-col" style="gap:6px">${vsBadges}</div>
      <div class="hth-col">
        <div class="hth-name" style="color:${modelColor(selB)}">${selB}</div>
        <div class="hth-metrics">${buildCol(statsB,statsA,metrics)}</div>
      </div>
    </div>
    <div class="chart-grid-1">
      <div class="chart-box">
        <div class="chart-title">${selA} vs ${selB} — throughput across profiles</div>
        <div class="chart-wrap"><canvas id="c-eng-hth"></canvas></div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════
//  CHARTS
// ════════════════════════════════════════════════════════
const CI={};
function destroyAllCharts(){Object.keys(CI).forEach(k=>{CI[k].destroy();delete CI[k];});}
function mkChart(id,cfg){
  const el=document.getElementById(id);
  if(!el)return;
  if(CI[id])CI[id].destroy();
  CI[id]=new Chart(el,cfg);
}
function chartBase(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  return{grid:dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)',
         text:dark?'#8888a0':'#55556a'};
}

function attachCharts(){
  const{grid,text}=chartBase();
  const models=getModels();
  const profiles=getProfiles();
  const axOpts=(title,unit)=>({
    grid:{color:grid},
    ticks:{color:text,font:{family:'Inter',size:11}},
    title:{display:!!title,text:title||'',color:text,font:{size:11}}
  });
  const basePlugins={legend:{display:false},tooltip:{callbacks:{}}};

  // ── CUSTOMER ALL ──
  if(document.getElementById('c-cust-thr')){
    const data=models.map(m=>mStats(m));
    mkChart('c-cust-thr',{type:'bar',
      data:{labels:models,datasets:[{
        data:data.map(d=>d.throughput),
        backgroundColor:models.map(m=>modelColor(m)+'bb'),
        borderColor:models.map(m=>modelColor(m)),
        borderWidth:1,borderRadius:5
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{...basePlugins,tooltip:{callbacks:{label:c=>`${(c.raw/1000).toFixed(1)}k tok/s`}}},
        scales:{x:axOpts(),y:axOpts('tok/s')}}});
  }
  if(document.getElementById('c-cust-gen')){
    const data=models.map(m=>mStats(m));
    mkChart('c-cust-gen',{type:'bar',
      data:{labels:models,datasets:[{
        data:data.map(d=>d.genSpeed),
        backgroundColor:models.map(m=>modelColor(m)+'bb'),
        borderColor:models.map(m=>modelColor(m)),
        borderWidth:1,borderRadius:5
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{...basePlugins,tooltip:{callbacks:{label:c=>`${c.raw?.toFixed(0)} tok/s/user`}}},
        scales:{x:axOpts(),y:axOpts('tok/s/user')}}});
  }

  // ── CUSTOMER HEAD-TO-HEAD profile line ──
  if(document.getElementById('c-cust-hth')){
    const{a,b}=S.hth.customer;
    if(a&&b){
      const dA=profiles.map(p=>mStats(a,p).throughput);
      const dB=profiles.map(p=>mStats(b,p).throughput);
      mkChart('c-cust-hth',{type:'line',
        data:{labels:profiles,datasets:[
          {label:a,data:dA,borderColor:modelColor(a),backgroundColor:modelColor(a)+'22',
           pointRadius:5,tension:.3,fill:false},
          {label:b,data:dB,borderColor:modelColor(b),backgroundColor:modelColor(b)+'22',
           pointRadius:5,tension:.3,fill:false}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:true,labels:{color:text,font:{family:'Inter',size:11},boxWidth:10,padding:10}}},
          scales:{x:axOpts('Profile'),y:axOpts('Throughput tok/s')}}});
    }
  }

  // ── ENGINEER ALL ──
  if(document.getElementById('c-eng-all')){
    const key=S.engCmpMetric;
    const data=models.map(m=>mStats(m));
    const label={throughput:'tok/s',ttft:'ms',genSpeed:'tok/s/u',rpm:'req/min',throughputPerBox:'t/s/box'}[key]||'';
    mkChart('c-eng-all',{type:'bar',
      data:{labels:models,datasets:[{
        data:data.map(d=>d[key]),
        backgroundColor:models.map(m=>modelColor(m)+'bb'),
        borderColor:models.map(m=>modelColor(m)),
        borderWidth:1,borderRadius:5
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{...basePlugins,tooltip:{callbacks:{label:c=>`${c.raw?.toFixed(1)} ${label}`}}},
        scales:{x:axOpts(),y:axOpts(label)}}});
  }

  // ── ENGINEER SCATTER ──
  if(document.getElementById('c-eng-scatter')){
    mkChart('c-eng-scatter',{type:'scatter',
      data:{datasets:models.map(m=>{
        const s=mStats(m);
        return{label:m,data:[{x:s.throughput,y:s.ttft}],
          backgroundColor:modelColor(m)+'bb',borderColor:modelColor(m),pointRadius:9,pointHoverRadius:12};
      })},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,labels:{color:text,font:{family:'Inter',size:11},boxWidth:10,padding:8}},
          tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${(c.parsed.x/1000).toFixed(1)}k tok/s, ${c.parsed.y?.toFixed(1)}ms TTFT`}}},
        scales:{
          x:{...axOpts('Throughput tok/s'),title:{display:true,text:'Throughput (tok/s)',color:text}},
          y:{...axOpts('TTFT ms'),title:{display:true,text:'TTFT (ms)',color:text}}
        }}});
  }

  // ── ENGINEER HEAD-TO-HEAD profile line ──
  if(document.getElementById('c-eng-hth')){
    const{a,b}=S.hth.engineer;
    if(a&&b){
      const dA=profiles.map(p=>mStats(a,p).throughput);
      const dB=profiles.map(p=>mStats(b,p).throughput);
      mkChart('c-eng-hth',{type:'line',
        data:{labels:profiles,datasets:[
          {label:a,data:dA,borderColor:modelColor(a),backgroundColor:modelColor(a)+'22',
           pointRadius:5,tension:.3,fill:false},
          {label:b,data:dB,borderColor:modelColor(b),backgroundColor:modelColor(b)+'22',
           pointRadius:5,tension:.3,fill:false}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:true,labels:{color:text,font:{family:'Inter',size:11},boxWidth:10,padding:10}}},
          scales:{x:axOpts('Profile'),y:axOpts('Throughput tok/s')}}});
    }
  }
}

// ════════════════════════════════════════════════════════
//  BOOT — load Converted_data.json.json if available
// ════════════════════════════════════════════════════════
async function boot(){
  try{
    const res= await fetch('./Converted_data.json');
    if(!res.ok)throw new Error();
    const data=await res.json();
    data.records.forEach(r=>{r.isNew=false;S.records.push(r);});
    const models=[...new Set(data.records.map(r=>r.model))];
    models.forEach(m=>{
      const cnt=data.records.filter(r=>r.model===m).length;
      S.files.push({name:m,model:m,count:cnt,isNew:false});
    });
    updateStatus();
  }catch(e){}
  render();
}
boot();
</script>
